version: '3.8'

services:
  policy-center:
    build: .
    container_name: policy-center
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/policy_center.db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
      - STORAGE_TYPE=local
      - STORAGE_PATH=/app/uploads
      - DEBUG=${DEBUG:-false}
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
