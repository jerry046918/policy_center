version: '3.8'

services:
  policy-center:
    build:
      context: .
      dockerfile: Dockerfile
    image: policy-center:v0.1
    container_name: policy-center
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/policy_center.db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
      - STORAGE_TYPE=local
      - STORAGE_PATH=/app/uploads
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DEBUG=${DEBUG:-false}
    volumes:
      - policy-data:/app/data
      - policy-uploads:/app/uploads
      - policy-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  policy-data:
    driver: local
  policy-uploads:
    driver: local
  policy-logs:
    driver: local
